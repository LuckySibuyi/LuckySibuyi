<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
     
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #b3b3e4;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background-color: #f7f7f7;
            padding: 40px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
       
    img {
    width: 100%;
    border-radius: 2%;
  
}
.download-btn {
            width: 10%;
            margin-left: 45%;
            display: flex;
            margin-bottom: 18px;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #00b4cc;
            color: white;
            border-radius: 50px;
            font-size: 17px;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: #dd4e95;
            border-color: #0077cc;
            cursor: pointer;
        }

        
        .download-btn .icon {
            margin-right: 10px;
            font-size: 30px;
        }

        
    </style>
</head>
<body>
    <nav class="navbar">
                <a href="index.html"><i class="fa fa-arrow-left" aria-hidden="true" style="font-size: 30px;"></i></a>
            
        </nav>
        <a href="Lucky Sibuyi 2024 Candidate CV V2.pdf" class="download-btn" download>
            <span class="icon"></span> Download Resume
        </a>
    <div class="container">
        
        <div class="profile-image">
            <img src="cv.PNG" alt="Profile Picture">
        </div>
    </div>
</body>
</html>
